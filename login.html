<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido | Dashboard</title>
    
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <div class="container" style="display: flex; justify-content: center; align-items: center; text-align: center;">
        <div class="welcome-box">
            <h1>¡Bienvenido, <span id="user-name">Cargando...</span>!</h1>
            <p>Has iniciado sesión correctamente usando Supabase.</p>
            <br>
            <button id="logout-btn">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './src/js/supabase.js';

        const userNameDisplay = document.getElementById('user-name');
        const logoutBtn = document.getElementById('logout-btn');

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();

            if (user) {
                userNameDisplay.textContent = user.user_metadata.full_name || user.email;
            } else {
                window.location.href = "index.html";
            }
        }

        logoutBtn.addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            
            if (!error) {
                alert("Sesión cerrada correctamente");
                window.location.href = "index.html";
            } else {
                alert("Error al cerrar sesión: " + error.message);
            }
        });

        checkUser();
    </script>
</body>
</html>
